{% extends 'base.html' %}
{% block titulo %}Eliminar Planificación{% endblock %}
{% block contenido %}

<div style="max-width:500px;margin:3rem auto;">
    <div class="glass-card rounded-2xl p-8 text-center" style="border-top:3px solid rgba(239,68,68,0.4);">
        <div style="font-size:3rem;margin-bottom:1rem;">🗑️</div>
        <h2 style="font-family:'Playfair Display',serif;color:#f1f5f9;font-size:1.5rem;margin-bottom:0.5rem;">
            ¿Eliminar planificación?
        </h2>
        <p style="color:#475569;font-size:0.88rem;margin-bottom:0.5rem;">
            Esta acción no se puede deshacer.
        </p>
        <p style="color:#f4c842;font-weight:600;margin-bottom:2rem;">
            {{ plan.get_tipo_display }} — {{ plan.unidad_tema }}
        </p>
        <form method="post" style="display:flex;gap:0.75rem;justify-content:center;">
            {% csrf_token %}
            <a href="{% url 'planificaciones:lista' %}"
               style="padding:0.65rem 1.5rem;border-radius:8px;background:rgba(255,255,255,0.04);
                      border:1px solid rgba(255,255,255,0.08);color:#64748b;text-decoration:none;font-size:0.85rem;">
                Cancelar
            </a>
            <button type="submit" class="btn-danger">Sí, eliminar</button>
        </form>
    </div>
</div>

{% endblock %}

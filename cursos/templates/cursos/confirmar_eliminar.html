{% extends 'base.html' %}
{% block titulo %}Eliminar Curso{% endblock %}

{% block contenido %}

<div class="mb-8">
    <h1 style="font-family:'Playfair Display',serif;color:#ef4444;font-size:2rem;">
        🗑️ Confirmar Eliminación
    </h1>
</div>

<div class="glass-card rounded-2xl p-8 max-w-lg" style="border-left:3px solid #ef4444;">
    <h2 style="color:#fca5a5;font-size:1.15rem;font-weight:700;margin-bottom:0.75rem;">⚠️ ¿Estás seguro?</h2>
    <p style="color:#64748b;margin-bottom:0.5rem;">Eliminarás permanentemente:</p>
    <p style="color:#f1f5f9;font-size:1.2rem;font-weight:700;margin-bottom:0.5rem;">{{ objeto }}</p>
    <p style="color:#ef4444;font-size:0.85rem;margin-bottom:2rem;">Esta acción no se puede deshacer.</p>
    <form method="post" class="flex gap-4 items-center">
        {% csrf_token %}
        <button type="submit" class="btn-danger" style="padding:0.7rem 1.5rem;font-size:0.9rem;">🗑️ Sí, eliminar</button>
        <a href="javascript:history.back()" style="color:#475569;font-size:0.85rem;text-decoration:none;">← Cancelar</a>
    </form>
</div>

{% endblock %}

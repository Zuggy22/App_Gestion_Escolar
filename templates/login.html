{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Liceo Municipal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        h1,h2 { font-family: 'Playfair Display', serif; }

        body {
            background: linear-gradient(135deg, #050d1a 0%, #0a1628 60%, #0f2040 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Patrón de fondo */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(30,63,122,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(244,200,66,0.05) 0%, transparent 40%);
            pointer-events: none;
        }

        .login-card {
            background: rgba(10,22,40,0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(244,200,66,0.15);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.6);
            animation: fadeUp 0.6s ease forwards;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #f4c842, transparent);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .input-field {
            background: rgba(5,13,26,0.8);
            border: 1px solid rgba(244,200,66,0.15);
            color: #e2e8f0;
            padding: 0.85rem 1.1rem;
            border-radius: 10px;
            width: 100%;
            font-size: 0.9rem;
            transition: all 0.3s;
            outline: none;
            font-family: 'DM Sans', sans-serif;
        }
        .input-field:focus {
            border-color: rgba(244,200,66,0.5);
            box-shadow: 0 0 0 3px rgba(244,200,66,0.08);
        }
        .input-field::placeholder { color: #374151; }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #f4c842, #e6b800);
            color: #050d1a;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 0.9rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.5px;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #fff, #f4c842);
            box-shadow: 0 8px 30px rgba(244,200,66,0.4);
            transform: translateY(-1px);
        }

        .decorative-circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(244,200,66,0.05), transparent);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- Círculos decorativos -->
    <div class="decorative-circle" style="width:400px;height:400px;top:-100px;right:-100px;"></div>
    <div class="decorative-circle" style="width:300px;height:300px;bottom:-80px;left:-80px;"></div>

    <div class="login-card">
        <!-- Logo -->
        <div style="text-align:center; margin-bottom:2rem;">
            <div style="width:64px;height:64px;background:linear-gradient(135deg,#1e3f7a,#0f2040);border:2px solid rgba(244,200,66,0.3);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 1rem;">
                🏛️
            </div>
            <h1 style="color:#f4c842;font-size:1.6rem;margin-bottom:0.3rem;">
                Liceo Municipal
            </h1>
            <p style="color:#475569;font-size:0.85rem;">
                Sistema de Gestión Escolar
            </p>
        </div>

        <!-- Separador -->
        <div style="height:1px;background:linear-gradient(90deg,transparent,rgba(244,200,66,0.2),transparent);margin-bottom:2rem;"></div>

        <!-- Error -->
        {% if form.errors %}
        <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;padding:0.85rem 1rem;border-radius:10px;font-size:0.85rem;margin-bottom:1.5rem;">
            ⚠️ Usuario o contraseña incorrectos. Intenta nuevamente.
        </div>
        {% endif %}

        <!-- Formulario -->
        <form method="post" style="display:flex;flex-direction:column;gap:1.2rem;">
            {% csrf_token %}

            <div>
                <label style="display:block;color:#94a3b8;font-size:0.8rem;font-weight:600;margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.5px;">
                    Usuario
                </label>
                <input type="text" name="username" required autofocus
                       placeholder="Ingresa tu usuario"
                       class="input-field">
            </div>

            <div>
                <label style="display:block;color:#94a3b8;font-size:0.8rem;font-weight:600;margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.5px;">
                    Contraseña
                </label>
                <input type="password" name="password" required
                       placeholder="••••••••"
                       class="input-field">
            </div>

            <button type="submit" class="btn-login" style="margin-top:0.5rem;">
                Ingresar al Sistema
            </button>
        </form>

        <!-- Footer -->
        <p style="text-align:center;color:#1e3a5f;font-size:0.75rem;margin-top:2rem;">
            Acceso restringido · Solo personal autorizado
        </p>
    </div>
</body>
</html>
